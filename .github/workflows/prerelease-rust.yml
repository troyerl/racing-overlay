name: Rust Prerelease

# Build a Windows installer from feature/rust and publish it as a GitHub
# *prerelease* under tag v<version>-rust. Does not touch the stable
# v<version> release from main / master.
on:
  push:
    branches: [feature/rust]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read version & notes from RELEASE.md
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -m1 -E '^## [0-9]+\.[0-9]+\.[0-9]+' RELEASE.md | sed -E 's/^## ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          if [[ -z "$version" ]]; then
            echo "No '## <version>' section found in RELEASE.md" >&2
            exit 1
          fi
          preview="${version}-rust"
          sha="${GITHUB_SHA:0:7}"
          {
            echo "Rust overlay preview build from \`feature/rust\` (\`${sha}\`)."
            echo
            echo "This is a **prerelease** â€” it does not replace the stable \`v${version}\` release."
            echo
            # Body = lines after the top ## until the next ##
            awk -v ver="$version" '
              BEGIN { p=0 }
              /^## / {
                if (p) exit
                if ($0 ~ "^## " ver) { p=1; next }
              }
              p { print }
            ' RELEASE.md | sed -e 's/[[:space:]]*$//' | awk 'NF{p=1} p' | awk 'NF{last=NR} {a[NR]=$0} END{for(i=1;i<=last;i++) print a[i]}'
          } > RELEASE_NOTES.md
          {
            echo "version=$version"
            echo "preview=$preview"
            echo "tag=v$preview"
          } >> "$GITHUB_OUTPUT"
          echo "stable version: $version"
          echo "preview tag: v$preview"
          cat RELEASE_NOTES.md

      - name: Stamp Cargo workspace version
        shell: bash
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          awk -v v="$APP_VERSION" '
            BEGIN { in_pkg=0 }
            /^\[workspace\.package\]/ { in_pkg=1; print; next }
            /^\[/ { in_pkg=0 }
            in_pkg && /^version[[:space:]]*=/ {
              print "version = \"" v "\""
              next
            }
            { print }
          ' Cargo.toml > Cargo.toml.tmp
          mv Cargo.toml.tmp Cargo.toml
          grep -A2 '\[workspace\.package\]' Cargo.toml
          echo "Stamped workspace version = $APP_VERSION"

      - name: Test workspace
        run: cargo test --workspace

      - name: Build gridglance-overlay (release)
        env:
          GRIDGLANCE_GITHUB_REPO: ${{ github.repository }}
          GRIDGLANCE_MONGODB_READ_URI: ${{ secrets.GRIDGLANCE_MONGODB_READ_URI }}
        run: cargo build --release -p gridglance-overlay

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build the installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.preview }}" `
            "installer\gridglance.iss"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: GridGlance ${{ steps.ver.outputs.preview }} (Rust preview)
          body_path: RELEASE_NOTES.md
          files: installer_output/*.exe
          prerelease: true
          make_latest: false
