name: Build & Release

# Build a Windows installer, tag the commit, and publish a GitHub Release on
# every push to the main branch. Skip with "[skip ci]" in the commit message.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Compute version
        id: ver
        shell: bash
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp version and repo into the app
        shell: bash
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
          APP_REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import os, re
          v = os.environ["APP_VERSION"]
          repo = os.environ["APP_REPO"]
          p = "overlay/version.py"
          s = open(p, encoding="utf-8").read()
          s = re.sub(r'__version__\s*=.*', f'__version__ = "{v}"', s)
          s = re.sub(r'GITHUB_REPO\s*=.*', f'GITHUB_REPO = "{repo}"', s)
          open(p, "w", encoding="utf-8").write(s)
          print(s)
          PY

      - name: Build the app (PyInstaller)
        run: python build_windows.py --no-shortcut

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build the installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            "installer\racing_overlay.iss"

      - name: Publish release (creates the tag)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Racing Overlay ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: installer_output/*.exe
