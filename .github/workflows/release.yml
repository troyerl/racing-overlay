name: Build & Release

# Build a Windows installer, tag the commit, and publish a GitHub Release on
# every push to the main branch. Skip with "[skip ci]" in the commit message.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Read version & notes from RELEASE.md
        id: ver
        shell: bash
        env:
          PYTHONUTF8: "1"
        run: |
          python - <<'PY'
          import os, re, sys
          if hasattr(sys.stdout, "reconfigure"):
              sys.stdout.reconfigure(encoding="utf-8")
          s = open("RELEASE.md", encoding="utf-8").read()
          # The topmost "## <version> - <date>" section drives the release.
          m = re.search(r'^##\s+(\d+\.\d+\.\d+)[^\n]*\n', s, re.M)
          if not m:
              raise SystemExit("No '## <version>' section found in RELEASE.md")
          version = m.group(1)
          nxt = re.search(r'^##\s+', s[m.end():], re.M)
          body = (s[m.end(): m.end() + nxt.start()] if nxt else s[m.end():]).strip()
          with open("RELEASE_NOTES.md", "w", encoding="utf-8") as f:
              f.write(body + "\n")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"version={version}\n")
              f.write(f"tag=v{version}\n")
          print("version:", version)
          print(body)
          PY

      - name: Stamp version and repo into the app
        shell: bash
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
          APP_REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import os, re
          v = os.environ["APP_VERSION"]
          repo = os.environ["APP_REPO"]
          p = "overlay/version.py"
          s = open(p, encoding="utf-8").read()
          s = re.sub(r'__version__\s*=.*', f'__version__ = "{v}"', s)
          s = re.sub(r'GITHUB_REPO\s*=.*', f'GITHUB_REPO = "{repo}"', s)
          open(p, "w", encoding="utf-8").write(s)
          print(s)
          PY

      - name: Build the app (PyInstaller)
        run: python build_windows.py --no-shortcut

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build the installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            "installer\gridglance.iss"

      - name: Publish release (creates the tag)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: GridGlance ${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: installer_output/*.exe
