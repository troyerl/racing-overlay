name: Build & Release

# Build a Windows installer, tag the commit, and publish a GitHub Release on
# every push to the main branch. Skip with "[skip ci]" in the commit message.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read version & notes from RELEASE.md
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -m1 -E '^## [0-9]+\.[0-9]+\.[0-9]+' RELEASE.md | sed -E 's/^## ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          if [[ -z "$version" ]]; then
            echo "No '## <version>' section found in RELEASE.md" >&2
            exit 1
          fi
          # Body = lines after the top ## until the next ##
          awk -v ver="$version" '
            BEGIN { p=0 }
            /^## / {
              if (p) exit
              if ($0 ~ "^## " ver) { p=1; next }
            }
            p { print }
          ' RELEASE.md | sed -e 's/[[:space:]]*$//' | awk 'NF{p=1} p' | awk 'NF{last=NR} {a[NR]=$0} END{for(i=1;i<=last;i++) print a[i]}' > RELEASE_NOTES.md
          {
            echo "version=$version"
            echo "tag=v$version"
          } >> "$GITHUB_OUTPUT"
          echo "version: $version"
          cat RELEASE_NOTES.md

      - name: Stamp Cargo workspace version
        shell: bash
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Replace version under [workspace.package] only.
          awk -v v="$APP_VERSION" '
            BEGIN { in_pkg=0 }
            /^\[workspace\.package\]/ { in_pkg=1; print; next }
            /^\[/ { in_pkg=0 }
            in_pkg && /^version[[:space:]]*=/ {
              print "version = \"" v "\""
              next
            }
            { print }
          ' overlay-rs/Cargo.toml > overlay-rs/Cargo.toml.tmp
          mv overlay-rs/Cargo.toml.tmp overlay-rs/Cargo.toml
          grep -A2 '\[workspace\.package\]' overlay-rs/Cargo.toml
          echo "Stamped workspace version = $APP_VERSION"

      - name: Build gridglance-overlay (release)
        working-directory: overlay-rs
        env:
          GRIDGLANCE_GITHUB_REPO: ${{ github.repository }}
        run: cargo build --release -p gridglance-overlay

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build the installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            "installer\gridglance.iss"

      - name: Publish release (creates the tag)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: GridGlance ${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: installer_output/*.exe
